map $http_x_forwarded_proto $fastcgi_https {
    default off;
    https on;
}

server {
    listen ${PORT};
    server_name _;
    root /var/www/html/public;

    index index.php index.html;
    charset utf-8;

    # Maximum file upload size
    client_max_body_size 100M;

    # EXPLICIT STATIC ASSET HANDLING (Highest Priority)
    location ~* ^/(dist|assets|images|theme|userfiles|favicon\.ico|robots\.txt) {
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ =404;
    }

    # Catch-all for sub-route assets (like /install/dist/...)
    location ~* (dist|assets|images|theme|userfiles|favicon\.ico|robots\.txt)(.*)$ {
        rewrite ^.*/(dist|assets|images|theme|userfiles|favicon\.ico|robots\.txt)(.*)$ /$1$2 last;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $fastcgi_https;
        
        # Optimization
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location ~ /\.ht {
        deny all;
    }
}
